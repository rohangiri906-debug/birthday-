
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body { margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: sans-serif; background-color: #ffe6eb; overflow: hidden; }
        .heart { position: absolute; top: -10px; color: #ff3366; font-size: 20px; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh); } }
        #music-control { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Happy Birthday!</h1>
    <p>This is your special surprise.</p>
    
    <div id="music-control">
        <audio autoplay loop id="bg-music">
            <source src="https://getsnap.link/aeu58851Z1Z" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Falling Hearts Animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 500);
    </script>
</body>
</html>
